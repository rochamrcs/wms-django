<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>WMS Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
    }
    .nav-link {
      border-left: 3px solid transparent;
      transition: all 0.15s ease;
    }
    .nav-link.active {
      background: rgba(59, 130, 246, 0.12);
      color: #3b82f6;
      border-left-color: #3b82f6;
    }
    #profile-menu { display: none; }
    #profile-menu.open { display: block; }
  </style>
</head>

<body class="bg-gray-100 min-h-screen">
<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col relative overflow-hidden">

    <!-- Logo -->
    <div class="px-6 py-7 border-b border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 10.5L12 3l9 7.5V21H3V10.5z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 21V12h6v9"/>
          </svg>
        </div>
        <div>
          <span class="text-base font-bold tracking-tight">WMS Pro</span>
          <span class="block text-xs text-green-400 font-semibold">v1.0</span>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-5 space-y-1">
      <p class="text-xs text-slate-500 uppercase font-semibold px-3 mb-3 tracking-widest">Estoque</p>

      <a href="{% url 'products:products' %}"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-slate-800">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 10V11"/>
        </svg>
        Produtos
      </a>
    </nav>

    <!-- Decorative glow -->
    <div class="absolute -bottom-16 -left-10 w-48 h-48 bg-blue-500 opacity-10 blur-3xl rounded-full pointer-events-none"></div>
  </aside>

  <!-- MAIN -->
  <div class="flex-1 flex flex-col">

    <!-- TOP BAR -->
    <header class="glass sticky top-0 z-30 border-b border-gray-200 px-8 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-base font-bold text-gray-800">Dashboard</h1>
        <p class="text-xs text-gray-400">Bem-vindo ao WMS Pro</p>
      </div>

      <div class="flex items-center gap-3 relative">

        <!-- Avatar -->
        <button id="profile-btn"
                class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold hover:bg-blue-700 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M5.121 17.804A10.97 10.97 0 0112 15c2.5 0 4.847.835 6.879 2.804M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>

        <!-- Dropdown -->
        <div id="profile-menu"
             class="absolute right-0 top-12 w-56 rounded-xl shadow-xl border border-gray-100 bg-white overflow-hidden z-50">
          <div class="px-4 py-3 border-b border-gray-100 bg-gray-50">
            <p class="text-sm font-semibold text-gray-800">Nome do Usuário</p>
            <p class="text-xs text-gray-400">usuario@email.com</p>
          </div>
          <div class="py-1">
            <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              Meu perfil
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              Configurações
            </a>
          </div>
          <div class="border-t border-gray-100 py-1">
            <a href="login.html" class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
              </svg>
              Sair
            </a>
          </div>
        </div>

      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="flex-1 p-8">
      {% block content %}{% endblock %}
    </main>

  </div>
</div>

<script>
  const profileBtn = document.getElementById('profile-btn');
  const gearBtn    = document.getElementById('gear-btn');
  const menu       = document.getElementById('profile-menu');

  function toggleMenu() { menu.classList.toggle('open'); }

  profileBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
  gearBtn.addEventListener('click',    (e) => { e.stopPropagation(); toggleMenu(); });
  document.addEventListener('click', () => menu.classList.remove('open'));
  menu.addEventListener('click', (e) => e.stopPropagation());
</script>

</body>
</html>
