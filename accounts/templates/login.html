<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>WMS Pro - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .glass {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
    }
  </style>
</head>

<body class="bg-gray-100">

<!-- Container -->
<div class="min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 rounded-2xl overflow-hidden shadow-xl">

    <!-- LEFT (Branding) -->
    <div class="hidden md:flex flex-col justify-between bg-slate-900 text-white p-10 relative">

      <div>
        <span class="text-xs bg-green-400 text-black px-3 py-1 rounded-full font-bold">
          v1.0
        </span>

        <h1 class="text-4xl font-bold mt-6 leading-tight">
          Gestão inteligente<br>de armazém
        </h1>

        <p class="text-gray-400 mt-4 max-w-sm">
          Controle total do seu estoque, movimentações e operações logísticas em tempo real.
        </p>
      </div>

      <!-- efeito -->
      <div class="absolute -bottom-20 -left-20 w-60 h-60 bg-blue-500 opacity-20 blur-3xl rounded-full"></div>

    </div>

    <!-- RIGHT (Form) -->
    <div class="glass p-8 md:p-14 flex flex-col justify-center">

      <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-800">
          Acesso ao sistema
        </h2>
        <p class="text-sm text-gray-500">
          Informe suas credenciais
        </p>
      </div>

        <form class="space-y-6" method="POST">
        {% csrf_token %}
        
        <!-- Email/Usuário -->
        <div>
            <label class="text-xs font-semibold text-gray-500 uppercase">
            Email ou usuário
            </label>
            <input 
            type="text"
            name="username"
            placeholder="seu@email.com"
            class="w-full mt-2 p-3 rounded-lg bg-gray-100 focus:ring-2 focus:ring-blue-500 outline-none"
            >
        </div>

        <!-- Senha -->
        <div>
            <div class="flex justify-between">
            <label class="text-xs font-semibold text-gray-500 uppercase">
                Senha
            </label>
            </div>
            <input 
            type="password"
            name="password"
            placeholder="••••••••"
            class="w-full mt-2 p-3 rounded-lg bg-gray-100 focus:ring-2 focus:ring-blue-500 outline-none"
            >
        </div>

        <!-- Botão -->
        <button 
            type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
        >
            Entrar
        </button>

        </form>

      <!-- Footer -->
      <div class="mt-10 pt-6 border-t text-sm text-gray-400">
        WMS Django © 2026
      </div>

    </div>

  </div>

</div>

</body>
</html>
